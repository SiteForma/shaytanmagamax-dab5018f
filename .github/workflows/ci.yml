name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shaytan_test
          POSTGRES_USER: magamax
          POSTGRES_PASSWORD: magamax
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U magamax -d shaytan_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pip install pip-audit
      - run: pip-audit
      - run: ruff check .
      - run: black --check .
      - run: mypy apps/api
      - run: pytest --tb=short
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+psycopg://magamax:magamax@localhost:5432/shaytan_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-not-for-production
          STARTUP_SCHEMA_MODE: auto_create
          OBJECT_STORAGE_MODE: local

  lint-and-test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm --prefix apps/web ci
      - run: npm --prefix apps/web run lint
      - run: npm --prefix apps/web run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install pip-audit
      - name: Python dependency audit
        run: |
          if [ -f requirements.lock ]; then
            pip-audit --requirement requirements.lock --strict
          else
            pip-audit . --strict
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm --prefix apps/web ci
      - run: npm --prefix apps/web audit --audit-level=high
